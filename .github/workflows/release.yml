name: Create Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.10)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine versions
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CURRENT="${{ github.event.inputs.version }}"
          else
            CURRENT=$(jq -r '.version' custom_components/axeos_ha_integration/manifest.json)
          fi

          HACS=$(jq -r '.version' hacs.json)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST="${LATEST_TAG#v}"

          echo "CURRENT=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "HACS=$HACS" >> "$GITHUB_OUTPUT"
          echo "LATEST=$LATEST" >> "$GITHUB_OUTPUT"

          echo "Current version: $CURRENT"
          echo "hacs.json version: $HACS"
          echo "Latest tag: $LATEST_TAG"

      - name: Compare against latest tag (semver)
        id: check_version
        run: |
          python3 - <<'PY'
          import os, sys

          current = os.environ['CURRENT']
          latest = os.environ['LATEST']

          def parse(v: str):
              parts = v.strip().split('.')
              if len(parts) != 3 or any(not p.isdigit() for p in parts):
                  raise ValueError(f"Invalid semver version: {v}")
              return tuple(int(p) for p in parts)

          try:
              c = parse(current)
              l = parse(latest)
          except Exception as e:
              print(f"❌ {e}")
              sys.exit(1)

          out = os.environ['GITHUB_OUTPUT']
          if c == l:
              print(f"ℹ️ Version {current} already released")
              with open(out, 'a') as f:
                  f.write('should_release=false\n')
          elif c < l:
              print(f"❌ New version {current} is lower than latest {latest}")
              sys.exit(1)
          else:
              print(f"✅ Version bump detected: {latest} -> {current}")
              with open(out, 'a') as f:
                  f.write('should_release=true\n')
          PY
        env:
          CURRENT: ${{ steps.version.outputs.CURRENT }}
          LATEST: ${{ steps.version.outputs.LATEST }}

      - name: Update versions (manual only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.version.outputs.CURRENT }}"
          jq --arg v "$VERSION" '.version = $v' custom_components/axeos_ha_integration/manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json custom_components/axeos_ha_integration/manifest.json
          jq --arg v "$VERSION" '.version = $v' hacs.json > /tmp/hacs.json
          mv /tmp/hacs.json hacs.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/axeos_ha_integration/manifest.json hacs.json
          git diff --staged --quiet || git commit -m "chore: bump version to $VERSION"
          git push origin main

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.CURRENT }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.check_version.outputs.should_release == 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.CURRENT }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        if: steps.check_version.outputs.should_release == 'true' && steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.CURRENT }}
          name: v${{ steps.version.outputs.CURRENT }}
          generate_release_notes: true
          draft: false
          prerelease: false

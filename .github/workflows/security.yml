name: security

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
      - name: Dependency Review

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - name: Checkout
      - name: Initialize CodeQL
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
      - name: Analyze
uses: github/codeql-action/analyze@820e3160e279568db735cee8ed8f8e77a6da7818
